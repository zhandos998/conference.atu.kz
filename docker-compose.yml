services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-conference}
      MYSQL_USER: ${MYSQL_USER:-conference}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend_laravel
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: Conference
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY:?Set APP_KEY in .env}
      APP_URL: ${APP_URL:-https://conference.atu.kz}
      FRONTEND_URL: ${FRONTEND_URL:-https://conference.atu.kz}
      LOG_CHANNEL: stderr
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-*}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-conference}
      DB_USERNAME: ${MYSQL_USER:-conference}
      DB_PASSWORD: ${MYSQL_PASSWORD:-conference}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: public
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SCHEME: ${MAIL_SCHEME:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-conference@atu.kz}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Conference}
    expose:
      - "80"
    volumes:
      - backend_storage:/var/www/html/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/up >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  backend_storage:
  mysql_data:
